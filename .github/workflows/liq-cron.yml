name: Liquidation Cron — Multi-Exchange

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 min (was 30)
  workflow_dispatch:

jobs:
  fetch-liquidations:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Fetch & store liquidations from all exchanges
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node << 'SCRIPT'
          const SUPABASE_URL      = process.env.SUPABASE_URL;
          const SUPABASE_ANON_KEY = process.env.SUPABASE_ANON_KEY;
          const PACIFICA_API      = 'https://api.pacifica.fi/api/v1';
          const LOOKBACK_MS       = 20 * 60 * 1000; // last 20 min
          const MIN_NOTIONAL      = 100;

          // ── Symbol normalisation ──────────────────────────────────────────
          function normalizeSymbol(raw = '') {
            let s = raw.toUpperCase().trim();
            s = s.replace(/USDT$/, '-USD').replace(/BUSD$/, '-USD');
            s = s.replace(/-USDT-SWAP$/, '-USD').replace(/-USD-SWAP$/, '-USD').replace(/-USDT$/, '-USD');
            if (!s.includes('-')) s = s + '-USD';
            return s;
          }

          // ── Upsert to Supabase ────────────────────────────────────────────
          async function upsert(rows) {
            if (!rows.length) return 0;
            const clean = rows.filter(r => r.notional >= MIN_NOTIONAL);
            if (!clean.length) return 0;
            try {
              const res = await fetch(`${SUPABASE_URL}/rest/v1/liquidations`, {
                method: 'POST',
                headers: {
                  'apikey':        SUPABASE_ANON_KEY,
                  'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                  'Content-Type':  'application/json',
                  'Prefer':        'resolution=ignore-duplicates,return=minimal',
                },
                body: JSON.stringify(clean),
              });
              if (!res.ok) {
                const txt = await res.text();
                console.log(`[upsert] ERROR ${res.status}: ${txt.slice(0,200)}`);
                return 0;
              }
              return clean.length;
            } catch (e) {
              console.error('[upsert] fetch error:', e.message);
              return 0;
            }
          }

          // ── Cleanup (7-day retention) ─────────────────────────────────────
          async function cleanup() {
            const since = new Date(Date.now() - 7 * 24 * 3600 * 1000).toISOString();
            try {
              const res = await fetch(`${SUPABASE_URL}/rest/v1/liquidations?ts=lt.${since}`, {
                method: 'DELETE',
                headers: {
                  'apikey':        SUPABASE_ANON_KEY,
                  'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                },
              });
              console.log(`[cleanup] 7d retention — status ${res.status}`);
            } catch (e) {
              console.error('[cleanup] error:', e.message);
            }
          }

          // ════════════════════════════════════════════════════════════════
          // SOURCE 1: Pacifica
          // ════════════════════════════════════════════════════════════════
          async function getPacificaSymbols() {
            try {
              const res = await fetch(`${PACIFICA_API}/info`, { signal: AbortSignal.timeout(8000) });
              const json = await res.json();
              return (json.success && Array.isArray(json.data)) ? json.data.map(m => m.symbol) : [];
            } catch (e) {
              console.error('[pacifica] symbol fetch error:', e.message);
              return [];
            }
          }

          async function fetchPacifica(symbols) {
            const cutoff = Date.now() - LOOKBACK_MS;
            const rows = [];
            const BATCH = 10;
            for (let i = 0; i < symbols.length; i += BATCH) {
              const batch = symbols.slice(i, i + BATCH);
              const results = await Promise.allSettled(batch.map(async (symbol) => {
                try {
                  const res = await fetch(`${PACIFICA_API}/trades?symbol=${symbol}&limit=200`, {
                    signal: AbortSignal.timeout(8000),
                  });
                  const json = await res.json();
                  const trades = (json.success && Array.isArray(json.data)) ? json.data : [];
                  return trades
                    .filter(t => {
                      const isLiq = t.cause === 'market_liquidation'
                        || t.cause === 'backstop_liquidation'
                        || (t.cause && t.cause.toLowerCase().includes('liq'));
                      if (!isLiq) return false;
                      const ts = t.created_at > 1e12 ? t.created_at : t.created_at * 1000;
                      return ts >= cutoff;
                    })
                    .map(t => {
                      const ts = t.created_at > 1e12 ? t.created_at : t.created_at * 1000;
                      const price    = parseFloat(t.price)  || 0;
                      const amount   = parseFloat(t.amount) || 0;
                      return {
                        trade_id: `pac-${symbol}-${t.created_at}-${Math.round(price*1000)}`,
                        symbol:   normalizeSymbol(symbol),
                        side:     t.side || 'unknown',
                        cause:    t.cause || 'pacifica',
                        source:   'pacifica',
                        price, amount,
                        notional: price * amount,
                        ts:       new Date(ts).toISOString(),
                      };
                    })
                    .filter(t => t.notional > 0);
                } catch (e) {
                  console.log(`[pacifica] ${symbol} error: ${e.message}`);
                  return [];
                }
              }));
              for (const r of results) if (r.status === 'fulfilled') rows.push(...r.value);
              if (i + BATCH < symbols.length) await new Promise(r => setTimeout(r, 200));
            }
            return rows;
          }

          // ════════════════════════════════════════════════════════════════
          // SOURCE 2: Binance Futures — allForceOrders
          // REST endpoint returns last N force orders (liquidations) per symbol
          // ════════════════════════════════════════════════════════════════
          const BINANCE_SYMBOLS = [
            'BTCUSDT','ETHUSDT','SOLUSDT','XRPUSDT','DOGEUSDT',
            'AVAXUSDT','LINKUSDT','BNBUSDT','LTCUSDT','ADAUSDT',
            'MATICUSDT','DOTUSDT','UNIUSDT','ATOMUSDT','NEARUSDT',
            'FILUSDT','AAVEUSDT','APTUSDT','ARBUSDT','OPUSDT',
            'INJUSDT','SUIUSDT','TIAUSDT','SEIUSDT','WIFUSDT',
            'PEPEUSDT','SHIBUSDT','FLOKIUSDT','ORDIUSDT','STXUSDT',
            'LDOUSDT','MKRUSDT','CRVUSDT','SNXUSDT','RNDRUSDT',
            'FETUSDT','AGIXUSDT','OCEANUSDT','WLDUSDT','JUPUSDT',
          ];

          async function fetchBinance() {
            const cutoff = Date.now() - LOOKBACK_MS;
            const rows   = [];
            const startTime = cutoff;

            const BATCH = 8;
            for (let i = 0; i < BINANCE_SYMBOLS.length; i += BATCH) {
              const batch = BINANCE_SYMBOLS.slice(i, i + BATCH);
              const results = await Promise.allSettled(batch.map(async (symbol) => {
                try {
                  const url = `https://fapi.binance.com/fapi/v1/allForceOrders?symbol=${symbol}&startTime=${startTime}&limit=100`;
                  const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
                  if (!res.ok) return [];
                  const data = await res.json();
                  if (!Array.isArray(data)) return [];
                  return data.map(o => {
                    const price    = parseFloat(o.averagePrice || o.price) || 0;
                    const amount   = parseFloat(o.executedQty || o.origQty) || 0;
                    const notional = price * amount;
                    // Binance: BUY side = short position liq; SELL = long position liq
                    const side = o.side === 'BUY' ? 'short_liquidation' : 'long_liquidation';
                    return {
                      trade_id: `bnb-${symbol}-${o.time}-${o.orderId}`,
                      symbol:   normalizeSymbol(symbol),
                      side,
                      cause:    'liquidation',
                      source:   'binance',
                      price, amount, notional,
                      ts:       new Date(o.time).toISOString(),
                    };
                  }).filter(r => r.notional >= MIN_NOTIONAL);
                } catch (e) {
                  console.log(`[binance] ${symbol} error: ${e.message}`);
                  return [];
                }
              }));
              for (const r of results) if (r.status === 'fulfilled') rows.push(...r.value);
              if (i + BATCH < BINANCE_SYMBOLS.length) await new Promise(r => setTimeout(r, 150));
            }
            return rows;
          }

          // ════════════════════════════════════════════════════════════════
          // SOURCE 3: Bybit — liquidation REST (v5/market/recent-trade filtered)
          // ════════════════════════════════════════════════════════════════
          const BYBIT_SYMBOLS = [
            'BTCUSDT','ETHUSDT','SOLUSDT','XRPUSDT','DOGEUSDT',
            'AVAXUSDT','LINKUSDT','BNBUSDT','ADAUSDT','DOTUSDT',
            'MATICUSDT','NEARUSDT','UNIUSDT','ATOMUSDT','APTUSDT',
            'ARBUSDT','OPUSDT','INJUSDT','SUIUSDT','WIFUSDT',
            'PEPEUSDT','SHIBUSDT','ORDIUSDT','STXUSDT','LDOUSDT',
          ];

          async function fetchBybit() {
            const cutoff = Date.now() - LOOKBACK_MS;
            const rows   = [];
            const BATCH  = 8;
            for (let i = 0; i < BYBIT_SYMBOLS.length; i += BATCH) {
              const batch = BYBIT_SYMBOLS.slice(i, i + BATCH);
              const results = await Promise.allSettled(batch.map(async (symbol) => {
                try {
                  // Bybit v5 liquidation endpoint
                  const url = `https://api.bybit.com/v5/market/recent-trade?category=linear&symbol=${symbol}&limit=200`;
                  const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
                  if (!res.ok) return [];
                  const json = await res.json();
                  const trades = json?.result?.list || [];
                  return trades
                    .filter(t => {
                      const ts = parseInt(t.time);
                      return ts >= cutoff && t.isBlockTrade === false;
                    })
                    .filter(t => t.execType === 'BustTrade' || t.execType === 'Liquidation')
                    .map(t => {
                      const price    = parseFloat(t.price) || 0;
                      const amount   = parseFloat(t.size)  || 0;
                      // Bybit: Buy side = long being liquidated (forced sell)
                      const side = t.side === 'Sell' ? 'long_liquidation' : 'short_liquidation';
                      return {
                        trade_id: `bbt-${symbol}-${t.time}-${t.execId || Math.round(price*100)}`,
                        symbol:   normalizeSymbol(symbol),
                        side,
                        cause:    'liquidation',
                        source:   'bybit',
                        price,
                        amount,
                        notional: price * amount,
                        ts:       new Date(parseInt(t.time)).toISOString(),
                      };
                    })
                    .filter(r => r.notional >= MIN_NOTIONAL);
                } catch (e) {
                  console.log(`[bybit] ${symbol} error: ${e.message}`);
                  return [];
                }
              }));
              for (const r of results) if (r.status === 'fulfilled') rows.push(...r.value);
              if (i + BATCH < BYBIT_SYMBOLS.length) await new Promise(r => setTimeout(r, 150));
            }
            return rows;
          }

          // ════════════════════════════════════════════════════════════════
          // SOURCE 4: OKX — liquidation-orders REST
          // ════════════════════════════════════════════════════════════════
          const OKX_SYMBOLS = [
            'BTC-USDT-SWAP','ETH-USDT-SWAP','SOL-USDT-SWAP','XRP-USDT-SWAP',
            'DOGE-USDT-SWAP','AVAX-USDT-SWAP','LINK-USDT-SWAP','BNB-USDT-SWAP',
            'ADA-USDT-SWAP','DOT-USDT-SWAP','MATIC-USDT-SWAP','NEAR-USDT-SWAP',
            'UNI-USDT-SWAP','ATOM-USDT-SWAP','APT-USDT-SWAP','ARB-USDT-SWAP',
            'OP-USDT-SWAP','INJ-USDT-SWAP','SUI-USDT-SWAP','LDO-USDT-SWAP',
          ];

          async function fetchOKX() {
            const rows = [];
            const BATCH = 5;
            for (let i = 0; i < OKX_SYMBOLS.length; i += BATCH) {
              const batch = OKX_SYMBOLS.slice(i, i + BATCH);
              const results = await Promise.allSettled(batch.map(async (instId) => {
                try {
                  const url = `https://www.okx.com/api/v5/public/liquidation-orders?instType=SWAP&instId=${instId}&state=filled&limit=100`;
                  const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
                  if (!res.ok) return [];
                  const json = await res.json();
                  const items = json?.data || [];
                  const cutoff = Date.now() - LOOKBACK_MS;
                  const out = [];
                  for (const item of items) {
                    for (const d of (item.details || [])) {
                      const ts = parseInt(d.ts);
                      if (ts < cutoff) continue;
                      const price    = parseFloat(d.bkPx)  || 0;
                      const size     = parseFloat(d.sz)    || 0;
                      const notional = price * size;
                      const side     = d.posSide === 'long' ? 'long_liquidation' : 'short_liquidation';
                      out.push({
                        trade_id: `okx-${instId}-${d.ts}-${Math.round(price*100)}`,
                        symbol:   normalizeSymbol(instId),
                        side,
                        cause:    'liquidation',
                        source:   'okx',
                        price,
                        amount:   size,
                        notional,
                        ts:       new Date(ts).toISOString(),
                      });
                    }
                  }
                  return out.filter(r => r.notional >= MIN_NOTIONAL);
                } catch (e) {
                  console.log(`[okx] ${instId} error: ${e.message}`);
                  return [];
                }
              }));
              for (const r of results) if (r.status === 'fulfilled') rows.push(...r.value);
              if (i + BATCH < OKX_SYMBOLS.length) await new Promise(r => setTimeout(r, 200));
            }
            return rows;
          }

          // ════════════════════════════════════════════════════════════════
          // SOURCE 5: Hyperliquid — liquidations via REST meta endpoint
          // ════════════════════════════════════════════════════════════════
          async function fetchHyperliquid() {
            try {
              const cutoff = Date.now() - LOOKBACK_MS;
              // Hyperliquid: POST /info with type=liquidations (if supported)
              // Fallback: fetch recent trades filtered by liq flag
              const res = await fetch('https://api.hyperliquid.xyz/info', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'liquidations', nResults: 500 }),
                signal: AbortSignal.timeout(10000),
              });
              if (!res.ok) return [];
              const data = await res.json();
              if (!Array.isArray(data)) return [];
              return data
                .filter(d => {
                  const ts = typeof d.time === 'number' ? d.time : parseInt(d.time);
                  return ts >= cutoff;
                })
                .map(d => {
                  const price    = parseFloat(d.px)  || 0;
                  const size     = parseFloat(d.sz)  || 0;
                  const notional = price * size;
                  const side     = d.dir?.includes('Long') ? 'long_liquidation' : 'short_liquidation';
                  const ts       = typeof d.time === 'number' ? d.time : parseInt(d.time);
                  return {
                    trade_id: `hl-${d.coin}-${d.time}-${Math.round(price*100)}`,
                    symbol:   normalizeSymbol(d.coin),
                    side,
                    cause:    'liquidation',
                    source:   'hyperliquid',
                    price,
                    amount:   size,
                    notional,
                    ts:       new Date(ts).toISOString(),
                  };
                })
                .filter(r => r.notional >= MIN_NOTIONAL);
            } catch (e) {
              console.error('[hyperliquid] REST error:', e.message);
              return [];
            }
          }

          // ════════════════════════════════════════════════════════════════
          // MAIN
          // ════════════════════════════════════════════════════════════════
          (async () => {
            if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
              console.error('Missing secrets');
              process.exit(1);
            }

            console.log('=== PacificaLens Multi-Exchange Liquidation Cron ===');
            console.log(`Lookback: ${LOOKBACK_MS / 60000} min | Min notional: $${MIN_NOTIONAL}`);

            // Fetch from all sources in parallel
            const [pacificaSymbols, binanceRows, bybitRows, okxRows, hlRows] = await Promise.all([
              getPacificaSymbols(),
              fetchBinance().catch(e => { console.error('[binance] failed:', e.message); return []; }),
              fetchBybit().catch(e => { console.error('[bybit] failed:', e.message); return []; }),
              fetchOKX().catch(e => { console.error('[okx] failed:', e.message); return []; }),
              fetchHyperliquid().catch(e => { console.error('[hyperliquid] failed:', e.message); return []; }),
            ]);

            // Pacifica needs symbols first
            const pacificaRows = await fetchPacifica(pacificaSymbols)
              .catch(e => { console.error('[pacifica] failed:', e.message); return []; });

            const allRows = [...pacificaRows, ...binanceRows, ...bybitRows, ...okxRows, ...hlRows];

            console.log(`Results:`);
            console.log(`  Pacifica:    ${pacificaRows.length} events`);
            console.log(`  Binance:     ${binanceRows.length} events`);
            console.log(`  Bybit:       ${bybitRows.length} events`);
            console.log(`  OKX:         ${okxRows.length} events`);
            console.log(`  Hyperliquid: ${hlRows.length} events`);
            console.log(`  TOTAL:       ${allRows.length} events`);

            // Upsert in batches of 200
            let total = 0;
            for (let i = 0; i < allRows.length; i += 200) {
              total += await upsert(allRows.slice(i, i + 200));
            }
            console.log(`Inserted/upserted: ${total} rows`);

            await cleanup();
            console.log('Done.');
          })();
          SCRIPT
